<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c1121f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect width="512" height="280" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Crown base band -->
  <rect x="108" y="310" width="296" height="48" rx="12" fill="white" opacity="0.95"/>

  <!-- Left spike -->
  <polygon points="130,310 170,198 210,276" fill="white" opacity="0.93"/>

  <!-- Middle spike (tallest) -->
  <polygon points="218,310 256,152 294,310" fill="white"/>

  <!-- Right spike -->
  <polygon points="302,276 342,198 382,310" fill="white" opacity="0.93"/>

  <!-- Left jewel -->
  <circle cx="170" cy="196" r="20" fill="#fbbf24"/>
  <circle cx="163" cy="189" r="6" fill="rgba(255,255,255,0.75)"/>

  <!-- Centre jewel -->
  <circle cx="256" cy="150" r="24" fill="#fbbf24"/>
  <circle cx="248" cy="143" r="7" fill="rgba(255,255,255,0.75)"/>

  <!-- Right jewel -->
  <circle cx="342" cy="196" r="20" fill="#fbbf24"/>
  <circle cx="335" cy="189" r="6" fill="rgba(255,255,255,0.75)"/>

  <!-- K letter on crown base -->
  <text
    x="256" y="346"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="40"
    fill="#c1121f"
    letter-spacing="1">K</text>

  <!-- KINGPLOYEE wordmark -->
  <text
    x="256" y="422"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-weight="700"
    font-size="33"
    fill="rgba(255,255,255,0.93)"
    letter-spacing="2.5">KINGPLOYEE</text>
</svg>
